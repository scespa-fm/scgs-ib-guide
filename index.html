<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SCGS初等部 IB理解の手引き</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;


const t = {
  bg: "#F8F6F1", surface: "#FFFFFF", ink: "#1A1A1A", muted: "#6B6860", faint: "#E8E4DC",
  green: "#2C6E49", greenPale: "#EAF3EE", blue: "#1D4E89", bluePale: "#EAF0F8",
  brown: "#7A4F2D", brownPale: "#F5EDE4", purple: "#6B3FA0", purplePale: "#F2EBF9",
  red: "#B03A2E", redPale: "#FAEAEA", amber: "#B07D2A", amberPale: "#FFF8E6",
};

const routeConfig = {
  A: { color: t.green, pale: t.greenPale, label: "Route A", emoji: "📚" },
  B: { color: t.blue, pale: t.bluePale, label: "Route B", emoji: "🔍" },
  C: { color: t.purple, pale: t.purplePale, label: "Route C", emoji: "🏠" },
  D: { color: t.red, pale: t.redPale, label: "Route D", emoji: "🧭" },
};

function Tag({ text, color }) {
  return <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", background: color + "22", color, border: `1px solid ${color}44` }}>{text}</span>;
}

function Quote({ children }) {
  return <div style={{ margin: "20px 0", padding: "14px 20px", borderLeft: `4px solid ${t.green}`, background: t.greenPale, borderRadius: "0 8px 8px 0", fontSize: 15, color: t.ink, lineHeight: 1.8, fontStyle: "italic" }}>{children}</div>;
}

function Note({ children }) {
  return <div style={{ margin: "16px 0", padding: "12px 16px", background: t.amberPale, border: `1px solid ${t.amber}44`, borderRadius: 8, fontSize: 13, color: t.amber, lineHeight: 1.7 }}>⚠️ {children}</div>;
}

function SectionDivider() {
  return <div style={{ height: 1, background: t.faint, margin: "32px 0" }} />;
}

function ChapterSummary({ items, color }) {
  return (
    <div style={{ background: color + "11", border: `1px solid ${color}33`, borderRadius: 10, padding: "16px 20px", marginBottom: 28 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color, letterSpacing: "0.08em", marginBottom: 10 }}>この章でわかること</div>
      {items.map((item, i) => (
        <div key={i} style={{ display: "flex", gap: 8, marginBottom: 6, fontSize: 14, color: t.ink, lineHeight: 1.6 }}>
          <span style={{ color, fontWeight: 700, flexShrink: 0 }}>▸</span><span>{item}</span>
        </div>
      ))}
    </div>
  );
}

function CompareTable({ headers, rows, colors }) {
  return (
    <div style={{ overflowX: "auto", margin: "20px 0" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead><tr>{headers.map((h, i) => <th key={i} style={{ padding: "10px 12px", background: i === 0 ? t.faint : (colors[i - 1] || t.green), color: i === 0 ? t.muted : "#fff", fontWeight: 700, textAlign: "left", borderBottom: `2px solid ${t.faint}`, fontSize: 12 }}>{h}</th>)}</tr></thead>
        <tbody>{rows.map((row, i) => <tr key={i} style={{ background: i % 2 === 0 ? "#fff" : t.bg }}>{row.map((cell, j) => <td key={j} style={{ padding: "10px 12px", color: j === 0 ? t.muted : t.ink, fontWeight: j === 0 ? 700 : 400, borderBottom: `1px solid ${t.faint}`, lineHeight: 1.6, fontSize: j === 0 ? 12 : 13 }}>{cell}</td>)}</tr>)}</tbody>
      </table>
    </div>
  );
}

function ActionTable({ rows }) {
  return (
    <div style={{ overflowX: "auto", margin: "20px 0" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead><tr>
          <th style={{ padding: "10px 12px", background: t.muted, color: "#fff", textAlign: "left", fontSize: 12 }}>今の声かけ</th>
          <th style={{ padding: "10px 12px", background: t.green, color: "#fff", textAlign: "left", fontSize: 12 }}>試してみる声かけ</th>
        </tr></thead>
        <tbody>{rows.map(([a, b], i) => <tr key={i} style={{ background: i % 2 === 0 ? "#fff" : t.bg }}>
          <td style={{ padding: "10px 12px", color: t.muted, borderBottom: `1px solid ${t.faint}`, lineHeight: 1.6 }}>{a}</td>
          <td style={{ padding: "10px 12px", color: t.ink, borderBottom: `1px solid ${t.faint}`, lineHeight: 1.6 }}>{b}</td>
        </tr>)}</tbody>
      </table>
    </div>
  );
}

function NextRoutes({ items, onNavigate }) {
  const routeLabels = { A: "基礎学力は大丈夫？", B: "探究型学習って何をしているの？", C: "家庭でどう関わればいい？", D: "将来どうつながるの？" };
  const routeEmojis = { A: "📚", B: "🔍", C: "🏠", D: "🧭" };
  return (
    <div style={{ marginTop: 36 }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: t.muted, marginBottom: 14, letterSpacing: "0.06em" }}>新しい問いへ</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {items.map(({ text, route }, i) => (
          <button key={i} onClick={() => onNavigate(route)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", borderRadius: 8, background: "#fff", border: `1px solid ${routeConfig[route].color}44`, cursor: "pointer", textAlign: "left", width: "100%" }}>
            <span style={{ fontSize: 20, flexShrink: 0 }}>{routeEmojis[route]}</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: routeConfig[route].color, marginBottom: 3 }}>Route {route}：{routeLabels[route]}</div>
              <div style={{ fontSize: 12, color: t.muted, lineHeight: 1.6 }}>{text}</div>
            </div>
            <span style={{ color: routeConfig[route].color, fontSize: 16, flexShrink: 0 }}>→</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function ATLSkillsTable() {
  const items = [
    ["Thinking Skills｜思考スキル", "批判的・創造的に考え、学んだことを別の場面でも使い、自分の学び方を振り返る"],
    ["Communication Skills｜コミュニケーションスキル", "聞く・話す・読む・書く力、ICTを使って情報をやりとりする力"],
    ["Self-Management Skills｜自己管理スキル", "時間や課題をうまく管理する力、粘り強さや気持ちのコントロール"],
    ["Research Skills｜リサーチスキル", "情報を集め、整理し、評価し、伝える力"],
    ["Social Skills｜社会性スキル", "他者と良い関係を築き、力を合わせて取り組む力"],
  ];
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", background: t.blue, borderRadius: "8px 8px 0 0", padding: "8px 12px" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#fff", width: 140, flexShrink: 0 }}>スキル</div>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#fff" }}>どんな力か</div>
      </div>
      {items.map(([label, desc], i) => {
        const [en, ja] = label.split("｜");
        return (
          <div key={i} style={{ display: "flex", alignItems: "center", background: i % 2 === 0 ? "#fff" : t.bluePale, borderBottom: `1px solid ${t.faint}`, padding: "10px 12px" }}>
            <div style={{ width: 140, flexShrink: 0, paddingRight: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: t.blue }}>{en}</div>
              <div style={{ fontSize: 12, color: t.muted, marginTop: 2 }}>{ja}</div>
            </div>
            <div style={{ fontSize: 13, color: t.ink, lineHeight: 1.6 }}>{desc}</div>
          </div>
        );
      })}
    </div>
  );
}

function LearnerProfileTable() {
  const items = [
    ["Inquirers", "探究する人", "好奇心を持ち、自ら問いを立てて学び続ける"],
    ["Knowledgeable", "知識のある人", "概念を深く理解し、様々な分野の知識を持つ"],
    ["Thinkers", "考える人", "批判的・創造的に思考し、複雑な問題に向き合う"],
    ["Communicators", "コミュニケーター", "複数の言語や方法で自分を表現し、他者の話を聞く"],
    ["Principled", "信念のある人", "誠実さと強い倫理観を持ち、自分の行動に責任を持つ"],
    ["Open-minded", "心を開く人", "自分と異なる視点や文化を尊重し、謙虚に学ぶ"],
    ["Caring", "思いやりのある人", "共感と思いやりを持ち、人や環境のために行動する"],
    ["Risk-takers", "挑戦する人", "不確かな状況にも勇気を持って向き合い、失敗から学ぶ"],
    ["Balanced", "バランスのとれた人", "知的・身体的・感情的な健康を大切にする"],
    ["Reflective", "振り返る人", "自分の学びや経験を振り返り、次に活かす"],
  ];
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", background: t.blue, borderRadius: "8px 8px 0 0", padding: "8px 12px" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#fff", width: 140, flexShrink: 0 }}>学習者像</div>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#fff" }}>どんな姿か</div>
      </div>
      {items.map(([en, ja, desc], i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", background: i % 2 === 0 ? "#fff" : t.bluePale, borderBottom: `1px solid ${t.faint}`, padding: "10px 12px" }}>
          <div style={{ width: 140, flexShrink: 0, paddingRight: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: t.blue }}>{en}</div>
            <div style={{ fontSize: 12, color: t.muted, marginTop: 2 }}>{ja}</div>
          </div>
          <div style={{ fontSize: 13, color: t.ink, lineHeight: 1.6 }}>{desc}</div>
        </div>
      ))}
    </div>
  );
}

function FAQ() {
  const items = [
    { q: "IBは英語教育ですか？", a: "英語は重要な要素ですが、IBの本質は英語そのものではなく、探究を通じた学び方のフレームワークです。英語力と探究する力を同時に育てる環境、というイメージが近いかもしれません。" },
    { q: "基礎学力は大丈夫ですか？", a: "漢字・計算・読解はSCGSでも学びます。一条校として学習指導要領に基づいた教育内容を扱うことが前提です。ただし「基礎学力」の定義自体が、学習指導要領の改訂で広がっています。知識を持つことだけでなく、使って考え、表現する力も含まれます。" },
    { q: "家庭では何をすればいいですか？", a: "特別なことより、日常の声かけが大切です。「なぜ？」「どう思う？」「どこまでわかった？」といった問いが、子どもの探究を支えます。答えを教えるより、一緒に考える姿勢を見せることが、一番の関わり方かもしれません。" },
    { q: "ドリル学習はIBと矛盾しますか？", a: "矛盾しません。ただし、ドリルを目的化せず「考えるための道具を磨くもの」として位置づけると、子どもの取り組み方が変わることがあります。" },
    { q: "探究型学習で、基礎的な知識は身につきますか？", a: "IBは知識を軽視しているのではなく、文脈の中に置いています。「なぜこれを知る必要があるのか」が見える状態で学ぶ設計です。" },
    { q: "将来の大学進学に影響しますか？", a: "IB資格は国内外の大学に認められており、国内でもIB入試を導入する大学が増えています。ただし進路については学校に直接確認するのが一番です。" },
    { q: "英語が苦手でも大丈夫ですか？", a: "イマージョン環境に浸かることで自然に習得していく設計です。入学時点での英語力より、環境に慣れていく過程を大切にしています。詳しくは学校にご確認ください。" },
  ];
  const [open, setOpen] = useState(null);
  return (
    <div style={{ marginTop: 8 }}>
      {items.map((item, i) => (
        <div key={i} style={{ border: `1px solid ${t.faint}`, borderRadius: 8, marginBottom: 8, overflow: "hidden" }}>
          <button onClick={() => setOpen(open === i ? null : i)} style={{ width: "100%", padding: "14px 18px", background: open === i ? t.greenPale : "#fff", border: "none", cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 14, fontWeight: 600, color: t.ink, lineHeight: 1.5 }}>Q. {item.q}</span>
            <span style={{ color: t.green, fontSize: 18, flexShrink: 0 }}>{open === i ? "▲" : "▼"}</span>
          </button>
          {open === i && <div style={{ padding: "14px 18px", background: t.greenPale, fontSize: 14, color: t.ink, lineHeight: 1.8, borderTop: `1px solid ${t.green}22` }}>A. {item.a}</div>}
        </div>
      ))}
    </div>
  );
}

function Page0() {
  return (
    <div>
      <Note>このコンテンツは保護者有志による非公式な学習・理解促進のためのものです。学校公式の見解ではありません。正確な情報は学校からの案内をご確認ください。</Note>
      <div style={{ margin: "28px 0 20px" }}>
        <p style={{ fontSize: 15, color: t.ink, lineHeight: 1.8, marginBottom: 12 }}>この手引きは、SCGS初等部の学びを3つの視点から一緒に考えるものです。</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
          {[
            { num: "①", label: "世界の教育の方向性", name: "OECD Learning Compass 2030", color: t.brown },
            { num: "②", label: "日本の教育の方向性", name: "学習指導要領", color: t.blue },
            { num: "③", label: "学校での実践", name: "IB PYP", color: t.green },
          ].map(({ num, label, name, color }) => (
            <div key={num} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", background: "#fff", border: `1px solid ${color}33`, borderLeft: `4px solid ${color}`, borderRadius: "0 8px 8px 0" }}>
              <span style={{ fontSize: 16, fontWeight: 800, color, minWidth: 24 }}>{num}</span>
              <div>
                <div style={{ fontSize: 11, color: t.muted, marginBottom: 2 }}>{label}</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: t.ink }}>{name}</div>
              </div>
            </div>
          ))}
        </div>
        <p style={{ fontSize: 14, color: t.muted, lineHeight: 1.7 }}>目的は用語を覚えることではなく、お子さんの学びが少し見えやすくなることです。気になるところから読んでください。</p>
      </div>
      <SectionDivider />
      <h2 style={{ fontSize: 18, fontWeight: 800, color: t.ink, marginBottom: 12 }}>この手引きを開いたあなたへ</h2>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, marginBottom: 12 }}>一つだけ最初にお伝えしたいことがあります。この手引きは、お子さんのためだけのものではありません。読んでいる保護者の皆さん自身が、この学びを一緒に楽しめるといいな、と思って作りました。</p>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, marginBottom: 16 }}>お子さんがSCGSに入学し、学校の様子を見聞きしながら、こんなことを感じていませんか。</p>
      {["IBって良さそうだけど、正直よくわかっていない", "探究とか言われても、具体的に何をしているのか掴めない", "PYP、Learner Profile、Unit of Inquiry……覚えなきゃいけないの？"].map((q, i) => <Quote key={i}>{q}</Quote>)}
      <p style={{ fontSize: 15, fontWeight: 800, color: t.green, lineHeight: 1.7, margin: "20px 0 12px" }}>大丈夫です。覚える必要はありません。</p>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, marginBottom: 12 }}>この手引きは、試験のための資料ではありません。繰り返し読んで、子どもの様子を観察して、また読んで、少しずつ「あ、そういうことか」と腹落ちしていくための道具です。</p>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8 }}>最初から全部わかろうとしなくていいです。わからないまま読み進めて構いません。大切なのは、あなた自身が問いを持ち続けることです。実はそれ自体が、子どもが学校でやっていることと同じです。</p>
      <SectionDivider />
      <div style={{ marginBottom: 8 }}><Tag text="共通する問題意識" color={t.brown} /></div>
      <h2 style={{ fontSize: 18, fontWeight: 800, color: t.ink, margin: "10px 0 12px" }}>3つの指針を知る前に</h2>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, marginBottom: 16 }}>これから紹介する3つの指針はそれぞれ異なる組織が異なる目的で作りましたが、出発点にある問題意識は同じです。</p>
      <Quote>知識を暗記して、正解を出すだけの学びでは、これからの社会を生きていけない</Quote>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, marginBottom: 12 }}>この問題意識は、日本だけでなく世界中で共有されています。社会の変化のスピードが、かつてとは比べものにならないほど速くなったからです。AIが多くの知識労働を代替し始め、気候変動・感染症・経済格差など国境を越えた問題が増えています。</p>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8 }}>こうした時代に必要なのは「たくさん知っている人」ではなく「知らないことに向き合い、考え、行動できる人」だ、という認識が世界的に広がりました。3つの指針はそれぞれ、この認識への応答です。</p>
      <SectionDivider />
      <div style={{ marginBottom: 8 }}><Tag text="指針①" color={t.brown} /></div>
      <h2 style={{ fontSize: 18, fontWeight: 800, color: t.ink, margin: "10px 0 12px" }}>OECD Learning Compass 2030</h2>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, marginBottom: 12 }}>OECD（経済協力開発機構）は世界38カ国が加盟する国際機関で、「PISA（ピサ）」という学力調査を実施している組織です。日本も加盟国です。</p>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, marginBottom: 12 }}>OECDは2019年、「Learning Compass 2030（学びの羅針盤2030）」というフレームワークを発表しました。羅針盤＝コンパスという名前には、こんな意味が込められています。</p>
      <Quote>2030年に向けて、正解の道はわかりません。でも方向は示せます</Quote>
      <p style={{ fontSize: 14, fontWeight: 700, color: t.ink, marginBottom: 8 }}>核心概念：Student Agency（生徒の主体性）</p>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, marginBottom: 12 }}>Learning Compass 2030の中心にあるのは「Student Agency」という概念です。「自分の人生と社会に対して、主体的に関わる力」と言えます。</p>
      <div style={{ background: t.brownPale, borderRadius: 8, padding: "14px 18px", marginBottom: 16 }}>
        {["自分で目標を設定できる", "状況を読んで判断できる", "行動できる", "その結果に責任をとれる", "振り返って次に活かせる"].map((item, i) => (
          <div key={i} style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, display: "flex", gap: 8 }}><span style={{ color: t.brown, fontWeight: 700 }}>▸</span>{item}</div>
        ))}
      </div>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8 }}>OECDはStudent Agencyを育てるために、学校だけでなく家庭も重要だと明示しています。安心できる家庭環境、失敗しても戻ってこられる場所、これが子どもが外で挑戦するための土台になると言っています。</p>
      <SectionDivider />
      <div style={{ marginBottom: 8 }}><Tag text="指針②" color={t.blue} /></div>
      <h2 style={{ fontSize: 18, fontWeight: 800, color: t.ink, margin: "10px 0 12px" }}>日本の学習指導要領</h2>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, marginBottom: 12 }}>学習指導要領は、日本の学校で何をどのように教えるかを定めた国の基準です。SCGSは一条校（学校教育法第一条に定める小学校）であるため、学習指導要領に従う義務があります。IBだから日本の学習内容と切り離されている、ということはありません。</p>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8, marginBottom: 16 }}>2017年の改訂の核心は「何ができるようになるか」を教育の中心に置いたこと。その目玉が「資質・能力の三本柱」です。</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
        {[
          { num: "①", title: "知識・技能", desc: "何を知っているか、何ができるか" },
          { num: "②", title: "思考力・判断力・表現力", desc: "知っていることをどう使うか" },
          { num: "③", title: "学びに向かう力・人間性", desc: "どんな姿勢で学ぶか" },
        ].map(({ num, title, desc }) => (
          <div key={num} style={{ padding: "12px 16px", background: t.bluePale, borderRadius: 8, borderLeft: `4px solid ${t.blue}` }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: t.blue }}>{num} {title}</div>

        ))}
      </div>
      <p style={{ fontSize: 14, color: t.ink, lineHeight: 1.8 }}>全部やろうとしなくていいです。一つだけ、今週試してみてください。そして気になることが出てきたら、またどこかのRouteに戻ってみてください。</p>
    </div>
  );
}

function App() {
  const [page, setPage] = useState("intro");
  const [scrolled, setScrolled] = useState(false);

  const navItems = [
    { id: "intro", label: "はじめに", color: t.green },
    { id: "A", label: "Route A", sub: "基礎学力", color: t.green },
    { id: "B", label: "Route B", sub: "探究学習", color: t.blue },
    { id: "C", label: "Route C", sub: "家庭の関わり", color: t.purple },
    { id: "D", label: "Route D", sub: "将来への接続", color: t.red },
    { id: "summary", label: "まとめ", color: t.green },
    { id: "faq", label: "FAQ", color: t.green },
  ];

  useEffect(() => { window.scrollTo(0, 0); setScrolled(false); }, [page]);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 48);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const currentRoute = ["A", "B", "C", "D"].includes(page) ? routeConfig[page] : null;

  return (
    <div style={{ background: t.bg, minHeight: "100vh", fontFamily: "'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif" }}>
      <div style={{ position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ background: t.green, overflow: "hidden", maxHeight: scrolled ? 0 : 64, transition: "max-height 0.25s ease" }}>
          <div style={{ maxWidth: 680, margin: "0 auto", padding: "14px 20px" }}>
            <div style={{ fontSize: 11, color: "#ffffff88", letterSpacing: "0.08em", marginBottom: 2 }}>保護者有志・非公式コンテンツ</div>
            <div style={{ fontSize: 15, fontWeight: 800, color: "#fff" }}>SCGS初等部 IB理解の手引き</div>
          </div>
        </div>
        <div style={{ background: "#fff", borderBottom: `1px solid ${t.faint}`, overflowX: "auto" }}>
          <div style={{ maxWidth: 680, margin: "0 auto", display: "flex", padding: "0 12px" }}>
            {navItems.map(({ id, label, sub, color }) => (
              <button key={id} onClick={() => setPage(id)} style={{ padding: "12px 14px", border: "none", borderBottom: page === id ? `3px solid ${color}` : "3px solid transparent", background: "none", cursor: "pointer", whiteSpace: "nowrap", color: page === id ? color : t.muted, fontWeight: page === id ? 700 : 400, fontSize: 13, transition: "all 0.15s" }}>
                {label}{sub && <span style={{ display: "block", fontSize: 10, color: page === id ? color : t.faint, marginTop: 1 }}>{sub}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 680, margin: "0 auto", padding: "28px 20px 60px" }}>
        {currentRoute && (
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <span style={{ fontSize: 24 }}>{currentRoute.emoji}</span>
              <span style={{ padding: "3px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700, background: currentRoute.color, color: "#fff" }}>{currentRoute.label}</span>
            </div>
            <h1 style={{ fontSize: 22, fontWeight: 900, color: t.ink, lineHeight: 1.3, margin: 0 }}>
              {page === "A" && "基礎学力は大丈夫？"}{page === "B" && "探究型学習って何をしているの？"}{page === "C" && "家庭でどう関わればいい？"}{page === "D" && "将来どうつながるの？"}
            </h1>
          </div>
        )}

        {page === "intro" && (
          <>
            <h1 style={{ fontSize: 22, fontWeight: 900, color: t.ink, marginBottom: 20 }}>はじめに</h1>
            <Page0 />
            <div style={{ marginTop: 32, padding: "20px 24px", background: t.greenPale, borderRadius: 12, border: `1px solid ${t.green}33` }}>
              <p style={{ fontSize: 14, fontWeight: 700, color: t.green, marginBottom: 12 }}>さあ、あなたの問いから始めましょう</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  { id: "A", label: "基礎学力は大丈夫？", desc: "漢字・計算・読解への不安がある方", emoji: "📚" },
                  { id: "B", label: "探究型学習って何をしているの？", desc: "授業の仕組みを具体的に知りたい方", emoji: "🔍" },
                  { id: "C", label: "家庭でどう関わればいい？", desc: "日々の関わり方を変えたい方", emoji: "🏠" },
                  { id: "D", label: "将来どうつながるの？", desc: "大きな文脈・将来への接続を知りたい方", emoji: "🧭" },
                ].map(({ id, label, desc, emoji }) => (
                  <button key={id} onClick={() => setPage(id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", borderRadius: 8, background: "#fff", border: `1px solid ${routeConfig[id].color}44`, cursor: "pointer", textAlign: "left" }}>
                    <span style={{ fontSize: 20 }}>{emoji}</span>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: routeConfig[id].color }}>{label}</div>
                      <div style={{ fontSize: 12, color: t.muted, marginTop: 2 }}>{desc}</div>
                    </div>
                    <span style={{ marginLeft: "auto", color: routeConfig[id].color, fontSize: 16 }}>→</span>
                  </button>
                ))}
              </div>
            </div>
          </>
        )}

        {page === "A" && <RouteA onNavigate={setPage} />}
        {page === "B" && <RouteB onNavigate={setPage} />}
        {page === "C" && <RouteC onNavigate={setPage} />}
        {page === "D" && <RouteD onNavigate={setPage} />}
        {page === "summary" && <><h1 style={{ fontSize: 22, fontWeight: 900, color: t.ink, marginBottom: 20 }}>明日からできる5つのこと</h1><Summary /></>}
        {page === "faq" && <><h1 style={{ fontSize: 22, fontWeight: 900, color: t.ink, marginBottom: 20 }}>よくある質問</h1><FAQ /></>}

        <div style={{ marginTop: 48, padding: "16px", background: t.faint, borderRadius: 8, fontSize: 12, color: t.muted, lineHeight: 1.8, textAlign: "center" }}>
          このコンテンツは聖隷クリストファーグローバルスクール初等部の保護者有志による非公式な学習・理解促進コンテンツです。学校公式の見解ではありません。正確な制度・運用は学校の公式案内をご確認ください。
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
